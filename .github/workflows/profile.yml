name: Refresh profile statistics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - today.py
      - .github/workflows/profile.yml
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the profile repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Refresh GitHub statistics
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROFILE_USERNAME: ved015
        run: python today.py

      - name: Commit refreshed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh profile stats"
            git push
          fi
